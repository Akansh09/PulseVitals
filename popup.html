<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>PulseVitals</title>
  <style>
    html, body {
      margin: 0; padding: 0;
      width: 380px; height: 520px;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      color: #0F172A;
      background: #FFFFFF;
    }
    body { display: flex; flex-direction: column; box-sizing: border-box; position: relative; }
    header {
      height: 48px; padding: 0 8px 0 16px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid #E2E8F0; gap: 6px;
    }
    h1 { margin: 0; font-size: 1.125rem; font-weight: 600; color: inherit; flex: 1; }
    .iconbtn {
      padding: 4px 8px; border: 1px solid #E2E8F0; background: transparent;
      border-radius: 4px; font: inherit; font-size: 0.75rem; color: #475569; cursor: pointer;
      white-space: nowrap;
    }
    .iconbtn:hover { border-color: #475569; }
    .iconbtn.active { background: #E11D48; color: #FFFFFF; border-color: #E11D48; }
    .subhead {
      padding: 12px 16px 4px; margin: 0; font-size: 0.875rem; color: #475569;
      display: flex; justify-content: space-between; align-items: baseline; gap: 8px;
    }
    .backlink {
      background: none; border: none; padding: 0; font: inherit; font-size: 0.75rem;
      color: #E11D48; cursor: pointer; text-decoration: underline;
    }
    .urlbar {
      margin: 4px 16px 12px; padding: 6px 8px;
      background: #F5F7FA; border-radius: 4px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.75rem; color: #475569;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .cwv-bar {
      margin: 0 16px 12px; padding: 10px 12px;
      border-radius: 6px; display: flex; align-items: center; gap: 10px;
      font-size: 0.875rem;
    }
    .cwv-bar.good { background: rgba(22, 163, 74, 0.1); color: #166534; }
    .cwv-bar.warn { background: rgba(217, 119, 6, 0.12); color: #9A3412; }
    .cwv-bar.bad { background: rgba(220, 38, 38, 0.1); color: #991B1B; }
    .cwv-bar.none { background: #F5F7FA; color: #475569; }
    .cwv-bar .pill { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
    .cwv-bar.good .pill { background: #16A34A; }
    .cwv-bar.warn .pill { background: #D97706; }
    .cwv-bar.bad .pill { background: #DC2626; }
    .cwv-bar.none .pill { background: #94A3B8; }
    .cwv-bar .label { font-weight: 600; }
    .cwv-bar .breakdown {
      flex: 1; text-align: right;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.7rem; opacity: 0.9;
    }
    .banner {
      margin: 0 16px 10px; padding: 10px 12px; border-radius: 6px; font-size: 0.8rem;
      display: flex; gap: 10px; align-items: flex-start; border: 1px solid transparent;
    }
    .banner.budget { background: rgba(220,38,38,0.10); color: #991B1B; border-color: rgba(220,38,38,0.3); }
    .banner .icon { font-size: 0.95rem; }
    .banner .main { flex: 1; line-height: 1.4; }
    .banner .main .title { font-weight: 600; }
    .banner .dismiss { background: none; border: none; cursor: pointer; color: inherit; font-size: 1rem; padding: 0; }
    .whatsnew {
      margin: 0 16px 10px; padding: 12px 14px; border-radius: 8px; font-size: 0.8rem;
      background: linear-gradient(135deg, rgba(225,29,72,0.08), rgba(225,29,72,0.03));
      border: 1px solid rgba(225,29,72,0.25);
    }
    .whatsnew .tag { font-size:0.65rem; font-weight:600; text-transform:uppercase; letter-spacing:0.06em;
      color:#E11D48; }
    .whatsnew .title { font-weight:600; margin:2px 0 4px; }
    .whatsnew .body-text { color:#475569; line-height:1.5; }
    .whatsnew .actions { margin-top: 8px; display:flex; gap:8px; }
    .whatsnew .actions button { font:inherit; font-size: 0.75rem; padding: 4px 8px;
      border-radius: 4px; background: #E11D48; color: #FFFFFF; border: none; cursor: pointer; }
    .whatsnew .actions button.ghost { background: transparent; color: #E11D48; border: 1px solid #E11D48; }
    .insight { padding: 10px 4px; border-bottom: 1px solid #E2E8F0; }
    .insight:last-of-type { border-bottom: none; }
    .insight-head { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .insight-sev { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .insight-sev.bad { background: #DC2626; }
    .insight-sev.warn { background: #D97706; }
    .insight-sev.platform { background: #E11D48; }
    .insight-title { font-weight: 600; font-size: 0.875rem; flex: 1; }
    .insight-savings {
      font-size: 0.75rem; color: #475569;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    .insight-fix { font-size: 0.75rem; color: #475569; line-height: 1.4; margin: 0; }
    .insights-empty {
      padding: 12px 4px; font-size: 0.875rem; color: #475569; line-height: 1.5;
    }
    .platform-tag {
      font-size: 0.6rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em;
      color: #E11D48; border: 1px solid rgba(225,29,72,0.3); padding: 1px 5px; border-radius: 4px;
      margin-right: 4px;
    }
    .tp-row { display: flex; align-items: center; padding: 6px 4px; gap: 10px;
      border-bottom: 1px solid #E2E8F0; font-size: 0.875rem; }
    .tp-row:last-of-type { border-bottom: none; }
    .tp-vendor-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; background: #94A3B8; }
    .tp-vendor { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .tp-vendor-name { font-weight: 600; font-size: 0.875rem; }
    .tp-origin { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 0.65rem;
      color: #475569; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tp-size { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 0.75rem;
      color: #475569; flex-shrink: 0; text-align: right; min-width: 54px; }
    .tp-count { font-size: 0.62rem; color: #475569; background: #F5F7FA; padding: 1px 5px; border-radius: 4px; }
    .check-row { display: flex; align-items: center; gap: 8px; padding: 6px 4px; font-size: 0.875rem;
      border-bottom: 1px solid #E2E8F0; }
    .check-row:last-of-type { border-bottom: none; }
    .check-icon { width: 16px; height: 16px; border-radius: 50%; display: inline-flex;
      align-items: center; justify-content: center; color: #FFFFFF; font-size: 0.65rem; flex-shrink: 0; }
    .check-icon.pass { background: #16A34A; }
    .check-icon.fail { background: #DC2626; }
    .check-icon.warn { background: #D97706; }
    .check-label { flex: 1; }
    .check-detail { font-size: 0.7rem; color: #475569; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    .score-tile { margin: 0 0 6px; padding: 12px 14px; border-radius: 8px;
      background: #F5F7FA; display: grid; grid-template-columns: auto 1fr; gap: 14px; align-items: center; }
    .score-tile .big-num { font-size: 2rem; font-weight: 700; line-height: 1; }
    .score-tile .big-num.good { color: #16A34A; }
    .score-tile .big-num.warn { color: #D97706; }
    .score-tile .big-num.bad { color: #DC2626; }
    .score-tile .kicker { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.06em; color: #475569; }
    .score-tile .subtitle { font-size: 0.875rem; font-weight: 600; margin: 2px 0 4px; }
    .score-tile .desc { font-size: 0.7rem; color: #475569; }
    .hist { display: flex; align-items: flex-end; gap: 3px; height: 56px; padding: 8px 0 4px; }
    .hist .bar { flex: 1; background: #CBD5E1; border-radius: 2px 2px 0 0; min-height: 2px; }
    .hist .bar.active { background: #E11D48; }
    .hist-legend { display: flex; justify-content: space-between; font-size: 0.6rem; color: #475569;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace; padding: 0 2px; }
    .rum-stat { display: flex; justify-content: space-between; padding: 3px 0; font-size: 0.8rem; }
    .rum-stat .val { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; color: #475569; }
    [hidden] { display: none !important; }
    #body { flex: 1; overflow-y: auto; padding: 0 16px 12px; }
    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    th {
      text-align: left; padding: 8px 4px;
      font-weight: 600; color: #475569;
      border-bottom: 1px solid #E2E8F0;
      position: sticky; top: 0; background: #FFFFFF; z-index: 1;
    }
    th.num, td.num {
      text-align: right;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    td { padding: 6px 4px; border-bottom: 1px solid #E2E8F0; }
    tr.subgroup td,
    h2.section-heading {
      padding: 16px 4px 6px;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #475569;
      border-bottom: 1px solid #E2E8F0;
    }
    h2.section-heading { margin: 16px 0 6px; padding: 16px 0 6px; border-top: 0; }
    h2.section-heading:first-child { margin-top: 0; padding-top: 0; }
    tr:last-child td { border-bottom: none; }
    .kv {
      display: flex; justify-content: space-between;
      padding: 6px 4px; font-size: 0.875rem;
      border-bottom: 1px solid #E2E8F0;
    }
    .kv:last-of-type { border-bottom: none; }
    .kv .value {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      color: #475569;
    }
    .kv .value.na { color: #94A3B8; font-style: italic; font-family: inherit; }
    td.resource {
      max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 0.75rem;
    }
    .history-item {
      display: block; width: 100%; text-align: left;
      padding: 10px 4px; border: none; background: transparent;
      border-bottom: 1px solid #E2E8F0; cursor: pointer; font: inherit; color: inherit;
    }
    .history-item:hover { background: #F5F7FA; }
    .history-item:last-of-type { border-bottom: none; }
    .history-item .when { font-size: 0.75rem; color: #475569; }
    .history-item .path {
      font-size: 0.875rem; margin: 2px 0;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .history-item .stats {
      font-size: 0.75rem; color: #475569;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    .state {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center;
      color: #475569; font-size: 0.875rem;
      padding: 16px 32px; line-height: 1.5;
    }
    .toast {
      position: absolute; bottom: 36px; left: 16px; right: 16px;
      padding: 8px 12px; background: #0F172A; color: #FFFFFF;
      border-radius: 6px; font-size: 0.75rem; text-align: center;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }
    .full-card { flex: 1; display: flex; flex-direction: column; padding: 24px 20px; justify-content: center; gap: 12px; }
    .full-card .logo { width: 44px; height: 44px; background: #E11D48; border-radius: 10px;
      display: flex; align-items: center; justify-content: center; margin-bottom: 4px; }
    .full-card .logo svg { width: 30px; height: 30px; }
    .full-card h2 { font-size: 1.125rem; font-weight: 600; margin: 0; }
    .full-card p { font-size: 0.8rem; color: #475569; line-height: 1.5; margin: 0; }
    .full-card ul { font-size: 0.8rem; color: #475569; margin: 0; padding-left: 18px; line-height: 1.6; }
    .full-card .cta-row { display: flex; gap: 8px; margin-top: 8px; }
    .full-card .cta-primary { flex: 1; padding: 9px 12px; background: #E11D48; color: #FFFFFF;
      border: none; border-radius: 6px; font: inherit; font-weight: 600; cursor: pointer; }
    .full-card .cta-ghost { padding: 9px 12px; background: transparent; color: #E11D48;
      border: 1px solid #E11D48; border-radius: 6px; font: inherit; cursor: pointer; }
    footer {
      height: 24px; padding: 0 16px;
      display: flex; align-items: center; justify-content: space-between;
      border-top: 1px solid #E2E8F0;
      font-size: 0.7rem; color: #475569;
      gap: 8px;
    }
    footer a { color: #E11D48; text-decoration: none; }
    footer .sp { opacity: 0.5; }
    /* Waterfall */
    .wf-row { display: grid; grid-template-columns: 120px 1fr 56px; gap: 6px; align-items: center;
      padding: 4px 2px; font-size: 0.7rem; }
    .wf-name { font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .wf-track { position: relative; height: 12px; background: #F5F7FA; border-radius: 2px; }
    .wf-bar { position: absolute; top: 1px; height: 10px; border-radius: 2px; background: #CBD5E1; }
    .wf-bar.script { background: #F59E0B; }
    .wf-bar.css { background: #3B82F6; }
    .wf-bar.img { background: #10B981; }
    .wf-bar.xhr { background: #8B5CF6; }
    .wf-size { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; color: #475569;
      text-align: right; font-size: 0.65rem; }
    .wf-legend { display: flex; gap: 10px; font-size: 0.62rem; color: #475569; margin: 6px 0 0; flex-wrap: wrap; }
    .wf-sw { display: inline-block; width: 10px; height: 8px; border-radius: 2px; margin-right: 3px;
      vertical-align: middle; background: #CBD5E1; }
    .wf-sw.script { background: #F59E0B; }
    .wf-sw.css { background: #3B82F6; }
    .wf-sw.img { background: #10B981; }
    .wf-sw.xhr { background: #8B5CF6; }
    /* Console errors */
    .err-heading { display: flex; align-items: center; }
    .err-none { color: #16A34A; margin-left: 6px; font-weight: 600; font-size: 0.7rem; text-transform: none; letter-spacing: normal; }
    .err-count { background: #DC2626; color: #FFFFFF; border-radius: 10px; padding: 1px 8px;
      font-size: 0.65rem; font-weight: 600; margin-left: 6px; text-transform: none; letter-spacing: normal; }
    .err-row { display: flex; align-items: flex-start; gap: 8px; padding: 6px 4px; font-size: 0.8rem;
      border-bottom: 1px solid #E2E8F0; }
    .err-row:last-of-type { border-bottom: none; }
    .err-dot { width: 8px; height: 8px; border-radius: 50%; background: #DC2626;
      margin-top: 6px; flex-shrink: 0; }
    .err-info { flex: 1; min-width: 0; }
    .err-msg { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 0.72rem;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .err-src { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 0.62rem;
      color: #475569; margin-top: 2px; }
    /* Image insight badge */
    .image-tag { display: inline-block; font-size: 0.6rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.05em; color: #10B981; border: 1px solid rgba(16,185,129,0.4);
      padding: 1px 5px; border-radius: 3px; margin-right: 6px; }
    /* History compare */
    .history-actionbar { position: sticky; top: 0; background: #FFFFFF; padding: 8px 4px;
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid #E2E8F0; font-size: 0.75rem; color: #475569; z-index: 2; }
    .history-actionbar button { padding: 4px 10px; background: #E11D48; color: #FFFFFF;
      border: none; border-radius: 4px; font: inherit; font-size: 0.72rem; cursor: pointer; }
    .history-actionbar button:disabled { opacity: 0.4; cursor: not-allowed; }
    .history-item { padding-left: 32px; position: relative; }
    .history-chk { position: absolute; left: 8px; top: 12px; width: 16px; height: 16px;
      border: 1px solid #CBD5E1; border-radius: 3px; cursor: pointer; background: transparent; }
    .history-item.sel .history-chk { background: #E11D48; border-color: #E11D48; }
    .history-item.sel .history-chk::after { content: "\2713"; color: #FFFFFF; font-size: 0.7rem;
      position: absolute; top: 0; left: 2px; line-height: 16px; font-weight: 700; }
    .history-note { font-size: 0.7rem; color: #E11D48; margin-top: 3px; font-style: italic;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    /* Diff view */
    .diff-header { display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
      padding: 8px 0 12px; font-size: 0.68rem; color: #475569; }
    .diff-header .col-a, .diff-header .col-b { padding: 6px 8px; background: #F5F7FA; border-radius: 4px; line-height: 1.4; }
    .diff-row { display: grid; grid-template-columns: 1fr auto 1fr auto;
      gap: 6px; padding: 6px 4px; font-size: 0.8rem; border-bottom: 1px solid #E2E8F0;
      align-items: center; }
    .diff-row .label { font-weight: 600; grid-column: 1 / -1; padding-top: 4px; font-size: 0.72rem; }
    .diff-row .a, .diff-row .b { font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.72rem; }
    .diff-row .arrow { color: #94A3B8; font-size: 0.7rem; }
    .diff-row .delta { font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.65rem; padding: 1px 5px; border-radius: 3px; }
    .delta.better { background: rgba(22,163,74,0.15); color: #166534; }
    .delta.worse { background: rgba(220,38,38,0.15); color: #991B1B; }
    .delta.same { color: #94A3B8; }
    /* Annotation */
    .anno-row { padding: 6px 0 10px; border-bottom: 1px solid #E2E8F0; margin-bottom: 6px; }
    .anno-label { font-size: 0.62rem; color: #475569; text-transform: uppercase; letter-spacing: 0.06em;
      font-weight: 600; margin-bottom: 4px; }
    .anno-input { width: 100%; box-sizing: border-box; font: inherit; font-size: 0.78rem;
      padding: 6px 8px; border: 1px solid #E2E8F0; border-radius: 4px;
      background: #F5F7FA; color: inherit; resize: vertical; min-height: 34px;
      font-family: inherit; }
    .anno-saved { font-size: 0.62rem; color: #16A34A; opacity: 0; transition: opacity 0.2s; margin-left: 4px; }
    .anno-saved.show { opacity: 1; }

    :focus-visible {
      outline: 2px solid rgba(225, 29, 72, 0.6);
      outline-offset: 2px;
    }
    @media (prefers-color-scheme: dark) {
      html, body { color: #E6EDF3; background: #0B0F14; }
      header { border-bottom-color: #1F2933; }
      .iconbtn { border-color: #1F2933; color: #94A3B8; }
      .iconbtn:hover { border-color: #94A3B8; }
      .subhead, .state, th { color: #94A3B8; }
      .urlbar { background: #131820; color: #94A3B8; }
      th { background: #0B0F14; border-bottom-color: #1F2933; }
      td { border-bottom-color: #1F2933; }
      tr.subgroup td, h2.section-heading { color: #94A3B8; border-bottom-color: #1F2933; }
      .kv { border-bottom-color: #1F2933; }
      .kv .value { color: #94A3B8; }
      .history-item { border-bottom-color: #1F2933; }
      .history-item:hover { background: #131820; }
      .history-item .when, .history-item .stats { color: #94A3B8; }
      .cwv-bar.good { background: rgba(34, 197, 94, 0.15); color: #4ADE80; }
      .cwv-bar.warn { background: rgba(245, 158, 11, 0.15); color: #FBBF24; }
      .cwv-bar.bad { background: rgba(239, 68, 68, 0.15); color: #F87171; }
      .cwv-bar.none { background: #131820; color: #94A3B8; }
      .insight { border-bottom-color: #1F2933; }
      .insight-savings, .insight-fix, .insights-empty { color: #94A3B8; }
      .banner.budget { background: rgba(239,68,68,0.15); color: #F87171; border-color: rgba(239,68,68,0.4); }
      .whatsnew { background: linear-gradient(135deg, rgba(244,63,94,0.15), rgba(244,63,94,0.05)); border-color: rgba(244,63,94,0.35); }
      .whatsnew .body-text { color: #94A3B8; }
      .tp-row { border-bottom-color: #1F2933; }
      .tp-origin, .tp-size, .tp-count { color: #94A3B8; }
      .tp-count { background: #131820; }
      .check-row { border-bottom-color: #1F2933; }
      .check-detail { color: #94A3B8; }
      .score-tile { background: #131820; }
      .score-tile .kicker, .score-tile .desc { color: #94A3B8; }
      .hist .bar { background: #1F2933; }
      .hist-legend, .rum-stat .val { color: #94A3B8; }
      .full-card p, .full-card ul { color: #94A3B8; }
      footer { border-top-color: #1F2933; color: #94A3B8; }
      .toast { background: #E6EDF3; color: #0B0F14; }
      .wf-track { background: #131820; }
      .wf-size, .wf-legend { color: #94A3B8; }
      .wf-sw { background: #1F2933; }
      .err-row { border-bottom-color: #1F2933; }
      .err-src { color: #94A3B8; }
      .history-actionbar { background: #0B0F14; border-bottom-color: #1F2933; color: #94A3B8; }
      .history-chk { border-color: #1F2933; }
      .diff-header { color: #94A3B8; }
      .diff-header .col-a, .diff-header .col-b { background: #131820; }

    }
